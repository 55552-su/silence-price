<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>沉默的代价 - 反校园霸凌互动剧情</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
/* === RESET & BASE === */
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif;background:#000;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;-webkit-text-size-adjust:100%;touch-action:manipulation}
#game{position:relative;width:100%;height:100%;overflow:hidden}

/* === LOADING SCREEN === */
#loading-screen{position:absolute;inset:0;z-index:1000;background:#0a0a12;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s}
#loading-screen.hidden{opacity:0;pointer-events:none}
.loading-title{font-size:1.4rem;color:#e0dfe6;letter-spacing:.3em;margin-bottom:2rem;font-weight:300}
.loading-bar-wrap{width:60%;max-width:280px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.loading-bar{height:100%;width:0%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:2px;transition:width .3s}
.loading-tip{margin-top:1.2rem;font-size:.75rem;color:rgba(255,255,255,.35);letter-spacing:.1em}

/* === TITLE SCREEN === */
#title-screen{position:absolute;inset:0;z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#0d0d1a 0%,#1a1025 40%,#2d1b3d 100%);transition:opacity .8s}
#title-screen.active{display:flex}
#title-screen.fadeout{opacity:0}
.title-main{font-size:2rem;font-weight:700;color:#fff;letter-spacing:.15em;text-shadow:0 0 40px rgba(102,126,234,.5);margin-bottom:.5rem}
.title-sub{font-size:.85rem;color:rgba(255,255,255,.5);letter-spacing:.25em;margin-bottom:3rem;font-weight:300}
.title-start-btn{padding:.8rem 3rem;border:1px solid rgba(255,255,255,.25);border-radius:50px;color:#fff;font-size:.95rem;letter-spacing:.3em;cursor:pointer;background:transparent;transition:all .3s;position:relative;overflow:hidden}
.title-start-btn:active{background:rgba(255,255,255,.1);transform:scale(.97)}
.title-credit{position:absolute;bottom:2rem;font-size:.65rem;color:rgba(255,255,255,.2);letter-spacing:.1em}

/* === GAME SCENE === */
#scene-layer{position:absolute;inset:0;z-index:1}
.scene-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:opacity 1s;opacity:0}
.scene-bg.active{opacity:1}
.scene-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(0,0,0,.55) 70%,rgba(0,0,0,.85) 100%)}

/* === CHARACTER LAYER === */
#char-layer{position:absolute;inset:0;z-index:2;pointer-events:none}
.char-sprite{position:absolute;bottom:12%;height:65%;max-height:520px;max-width:36%;object-fit:contain;transition:all .6s cubic-bezier(.25,.46,.45,.94);opacity:0;transform:translateY(20px);filter:drop-shadow(0 4px 20px rgba(0,0,0,.5))}
.char-sprite.active{opacity:1;transform:translateY(0)}
.char-sprite.left{left:3%}
.char-sprite.center{left:50%;transform:translateX(-50%)}
.char-sprite.center.active{transform:translateX(-50%) translateY(0)}
.char-sprite.right{right:3%}
.char-sprite.dim{filter:brightness(.5) drop-shadow(0 4px 20px rgba(0,0,0,.5))}
/* Mobile */
@media(max-width:480px){
  .char-sprite{height:60%;max-height:460px;max-width:40%;bottom:13%}
  .char-sprite.left{left:-5%}
  .char-sprite.right{right:-5%}
  .char-sprite.center{max-width:44%}
}
@media(max-width:375px){
  .char-sprite{height:56%;max-height:420px;max-width:38%}
  .char-sprite.center{max-width:42%}
}
.char-sprite.multi{max-width:28%;height:52%;max-height:420px}
@media(max-width:480px){.char-sprite.multi{height:48%;max-height:360px;max-width:32%}
.char-sprite.multi.left{left:-6%}.char-sprite.multi.right{right:-6%}}

/* === DIALOG BOX === */
#dialog-layer{position:absolute;bottom:0;left:0;right:0;z-index:10;padding:0 .8rem 1.2rem}
#dialog-box{background:rgba(10,10,20,.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:1rem 1.2rem .9rem;min-height:140px;position:relative;transition:opacity .4s,transform .4s;opacity:0;transform:translateY(20px)}
#dialog-box.active{opacity:1;transform:translateY(0)}
.speaker-name{display:inline-block;font-size:.85rem;color:#667eea;font-weight:600;margin-bottom:.5rem;letter-spacing:.08em;padding:2px 10px;background:rgba(102,126,234,.12);border-radius:20px}
.speaker-name.bully{color:#e84057;background:rgba(232,64,87,.12)}
.speaker-name.prosecutor{color:#50c8a8;background:rgba(80,200,168,.12)}
.speaker-name.narrator{color:rgba(255,255,255,.5);background:rgba(255,255,255,.06);font-style:italic}
.speaker-name.teacher{color:#d4a056;background:rgba(212,160,86,.12)}
#dialog-text{font-size:1.05rem;line-height:1.8;color:rgba(255,255,255,.88);min-height:3.2em;text-align:center}
#dialog-text .char{display:inline;opacity:0}
#dialog-text .char.show{opacity:1}
.dialog-indicator{position:absolute;bottom:10px;right:16px;width:8px;height:8px;border-right:2px solid rgba(255,255,255,.4);border-bottom:2px solid rgba(255,255,255,.4);transform:rotate(45deg);animation:indicator-bounce 1s infinite}
@keyframes indicator-bounce{0%,100%{transform:rotate(45deg) translate(0,0)}50%{transform:rotate(45deg) translate(2px,2px)}}

/* === CHOICES === */
#choices-layer{position:absolute;bottom:0;left:0;right:0;z-index:20;display:none;flex-direction:column;align-items:center;padding:0 1.2rem 2rem;gap:.7rem}
#choices-layer.active{display:flex}
.choice-btn{width:100%;max-width:380px;padding:.9rem 1.2rem;background:rgba(15,15,30,.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(102,126,234,.3);border-radius:12px;color:rgba(255,255,255,.9);font-size:.95rem;line-height:1.5;cursor:pointer;transition:all .25s;text-align:center;letter-spacing:.04em}
.choice-btn:active{background:rgba(102,126,234,.2);border-color:rgba(102,126,234,.6);transform:scale(.98)}

/* === CHAPTER TITLE OVERLAY === */
#chapter-overlay{position:absolute;inset:0;z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,5,15,.92);backdrop-filter:blur(4px);transition:opacity .8s}
#chapter-overlay.active{display:flex}
#chapter-overlay.fadeout{opacity:0}
.chapter-num{font-size:.75rem;color:rgba(255,255,255,.35);letter-spacing:.5em;text-transform:uppercase;margin-bottom:.8rem}
.chapter-title{font-size:1.6rem;color:#fff;font-weight:300;letter-spacing:.2em}
.chapter-line{width:40px;height:1px;background:rgba(255,255,255,.2);margin-top:1.5rem}

/* === NOTIFICATION / SYSTEM MESSAGE === */
#notify{position:absolute;top:15%;left:50%;transform:translateX(-50%);z-index:60;padding:.6rem 1.5rem;background:rgba(102,126,234,.15);border:1px solid rgba(102,126,234,.3);border-radius:30px;color:rgba(255,255,255,.8);font-size:.78rem;letter-spacing:.08em;opacity:0;transition:opacity .4s;pointer-events:none;white-space:nowrap}
#notify.show{opacity:1}

/* === ENDING SCREEN === */
#ending-screen{position:absolute;inset:0;z-index:80;display:none;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
#ending-screen.active{display:flex}
.ending-badge{font-size:.7rem;letter-spacing:.4em;color:rgba(255,255,255,.35);margin-bottom:1rem;text-transform:uppercase}
.ending-title{font-size:1.5rem;color:#fff;font-weight:600;letter-spacing:.12em;margin-bottom:1.5rem}
.ending-desc{font-size:.85rem;color:rgba(255,255,255,.6);line-height:1.9;max-width:320px;margin-bottom:2.5rem}
.ending-restart{padding:.7rem 2.5rem;border:1px solid rgba(255,255,255,.2);border-radius:50px;color:rgba(255,255,255,.7);font-size:.82rem;letter-spacing:.2em;cursor:pointer;background:transparent;transition:all .3s}
.ending-restart:active{background:rgba(255,255,255,.08)}

/* === STATS BAR (top) === */
#stats-bar{position:absolute;top:0;left:0;right:0;z-index:15;display:none;align-items:center;justify-content:space-between;padding:.8rem 1rem .5rem;background:linear-gradient(180deg,rgba(0,0,0,.5) 0%,transparent 100%)}
#stats-bar.active{display:flex}
.stat-item{font-size:.65rem;color:rgba(255,255,255,.45);letter-spacing:.05em}
.stat-val{color:rgba(255,255,255,.7);font-weight:600}
#menu-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:.5}
#menu-btn svg{width:18px;height:18px}

/* === MENU OVERLAY === */
#menu-overlay{position:absolute;inset:0;z-index:70;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,5,15,.93);backdrop-filter:blur(8px);gap:1rem}
#menu-overlay.active{display:flex}
.menu-item{padding:.7rem 2rem;color:rgba(255,255,255,.7);font-size:.9rem;letter-spacing:.2em;cursor:pointer;transition:color .2s}
.menu-item:active{color:#fff}

/* === ANIMATIONS === */
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-3px)}20%,40%,60%,80%{transform:translateX(3px)}}
.shake{animation:shake .5s}

/* === LEGAL INFO PANEL === */
#legal-panel{position:absolute;inset:0;z-index:55;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,5,15,.95);padding:2rem 1.5rem;overflow-y:auto}
#legal-panel.active{display:flex}
.legal-card{background:rgba(80,200,168,.06);border:1px solid rgba(80,200,168,.2);border-radius:14px;padding:1.2rem;max-width:340px;width:100%;margin-bottom:1rem}
.legal-card h3{font-size:.85rem;color:#50c8a8;margin-bottom:.6rem;letter-spacing:.08em}
.legal-card p{font-size:.78rem;color:rgba(255,255,255,.65);line-height:1.8}
.legal-close{margin-top:1rem;padding:.6rem 2rem;border:1px solid rgba(80,200,168,.3);border-radius:30px;color:rgba(80,200,168,.8);font-size:.8rem;cursor:pointer;background:transparent;letter-spacing:.15em}

/* === PARTICLE CANVAS === */
#particle-canvas{position:absolute;inset:0;z-index:3;pointer-events:none}

/* === TITLE SCREEN ENHANCEMENTS === */
#title-screen{background:#0a1628;overflow:hidden}
.title-bg-img{position:absolute;inset:0;z-index:0;background:url('title_bg.png') center/cover no-repeat;opacity:.85}
.title-bg-overlay{position:absolute;inset:0;z-index:0;background:linear-gradient(180deg,rgba(10,22,40,.3) 0%,rgba(10,22,40,.1) 30%,rgba(200,96,42,.1) 60%,rgba(232,160,64,.25) 100%)}
.title-emblem{position:absolute;top:18%;left:50%;transform:translate(-50%,-50%);width:120px;height:120px;z-index:2;background:url('title_emblem.png') center/contain no-repeat;opacity:.9;filter:drop-shadow(0 2px 16px rgba(232,160,64,.5))}
.title-badge{font-size:.65rem;color:rgba(255,255,255,.85);letter-spacing:.2em;padding:5px 18px;border:1px solid rgba(255,255,255,.3);border-radius:20px;margin-bottom:1.2rem;margin-top:6%;background:rgba(0,0,0,.25);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:2}
.title-main{font-family:'Ma Shan Zheng',cursive;font-size:3.6rem;font-weight:400;color:#fff;letter-spacing:.18em;text-shadow:0 0 60px rgba(232,160,64,.6),0 0 120px rgba(232,160,64,.3),0 2px 8px rgba(0,0,0,.5),0 4px 0 rgba(160,100,20,.25);margin-bottom:.6rem;z-index:2;animation:title-glow 3s ease-in-out infinite}
@keyframes title-glow{0%,100%{text-shadow:0 0 60px rgba(232,160,64,.6),0 0 120px rgba(232,160,64,.3),0 2px 8px rgba(0,0,0,.5)}50%{text-shadow:0 0 80px rgba(232,160,64,.8),0 0 160px rgba(232,160,64,.5),0 2px 8px rgba(0,0,0,.5)}}
.title-sub{font-size:1rem;color:rgba(255,255,255,.7);letter-spacing:.3em;margin-bottom:3rem;font-weight:300;z-index:2;text-shadow:0 1px 4px rgba(0,0,0,.4)}
.title-start-btn{padding:.9rem 3.5rem;border:2px solid rgba(232,160,64,.5);border-radius:50px;color:#fff;font-size:1rem;letter-spacing:.35em;cursor:pointer;background:rgba(232,160,64,.15);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);transition:all .3s;position:relative;overflow:hidden;z-index:2;animation:btn-pulse 2.5s ease-in-out infinite}
@keyframes btn-pulse{0%,100%{box-shadow:0 0 20px rgba(232,160,64,.2),0 0 40px rgba(232,160,64,.1)}50%{box-shadow:0 0 30px rgba(232,160,64,.4),0 0 60px rgba(232,160,64,.2);border-color:rgba(232,160,64,.7)}}
.title-start-btn:active{background:rgba(232,160,64,.25);transform:scale(.97)}
.title-credit{position:absolute;bottom:2rem;font-size:.6rem;color:rgba(255,255,255,.25);letter-spacing:.08em;z-index:2;text-align:center;padding:0 1rem}
.title-rays{position:absolute;top:18%;left:50%;width:340px;height:340px;transform:translate(-50%,-50%);z-index:1;pointer-events:none}
.title-ray{position:absolute;top:50%;left:50%;width:4px;height:180px;background:linear-gradient(180deg,rgba(232,180,80,.25),transparent);transform-origin:top center;border-radius:2px;animation:ray-rotate 20s linear infinite}
@keyframes ray-rotate{from{transform:rotate(var(--r))}to{transform:rotate(calc(var(--r) + 360deg))}}
.title-silhouette{display:none}
.title-building-mid{display:none}
.title-building-r{display:none}
@media(max-width:480px){.title-main{font-size:2.8rem}.title-rays{width:260px;height:260px}.title-ray{height:150px}.title-emblem{width:95px;height:95px}}
</style>
</head>
<body>
<div id="game">
  <!-- Loading -->
  <div id="loading-screen">
    <div class="loading-title">LOADING</div>
    <div class="loading-bar-wrap"><div class="loading-bar" id="loading-bar"></div></div>
    <div class="loading-tip">正在加载资源...</div>
  </div>

  <!-- Title -->
  <div id="title-screen">
    <div class="title-bg-img"></div>
    <div class="title-bg-overlay"></div>
    <div class="title-rays" id="title-rays"></div>
    <div class="title-emblem"></div>
    <div class="title-badge">检察机关未成年人法治教育</div>
    <div class="title-main">沉默的代价</div>
    <div class="title-sub">反校园霸凌互动剧情</div>
    <div class="title-start-btn" id="start-btn">开始游戏</div>
    <div class="title-credit">向每一位勇敢发声的少年致敬 | Music by Kevin MacLeod (incompetech.com) CC BY 4.0</div>
  </div>

  <!-- Scene BG -->
  <div id="scene-layer">
    <div class="scene-bg" id="scene-bg"></div>

  </div>

  <!-- Characters -->
  <div id="char-layer"></div>

  <!-- Particle Effects -->
  <canvas id="particle-canvas"></canvas>

  <!-- Stats -->
  <div id="stats-bar">
    <div class="stat-item">勇气 <span class="stat-val" id="stat-courage">0</span></div>
    <div class="stat-item">信任 <span class="stat-val" id="stat-trust">0</span></div>
    <div class="stat-item" id="chapter-display">第一章</div>
    <div id="menu-btn" onclick="toggleMenu()"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></div>
  </div>

  <!-- Dialog -->
  <div id="dialog-layer">
    <div id="dialog-box">
      <div class="speaker-name" id="speaker-name"></div>
      <div id="dialog-text"></div>
      <div class="dialog-indicator" id="dialog-indicator"></div>
    </div>
  </div>

  <!-- Choices -->
  <div id="choices-layer"></div>

  <!-- Chapter Overlay -->
  <div id="chapter-overlay">
    <div class="chapter-num" id="ch-num"></div>

  </div>

  <!-- Notification -->
  <div id="notify"></div>

  <!-- Legal Info Panel -->
  <div id="legal-panel">
    <div class="legal-card">
      <h3>placeholder</h3>
      <p>placeholder</p>
    </div>
    <div class="legal-close" onclick="closeLegal()">了解</div>
  </div>

  <!-- Ending -->
  <div id="ending-screen">

    <div class="ending-desc" id="ending-desc"></div>
    <div class="ending-restart" onclick="restartGame()">重新开始</div>
  </div>

  <!-- Menu -->
  <div id="menu-overlay">

</div>

<script>
// =============================================
// SFX SYSTEM (oscillator-based)
// =============================================
const SFX={
  ctx:null,
  _init(){if(!this.ctx){try{this.ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}},
  _play(freq,type,duration,gain,ramp){
    this._init();if(!this.ctx)return;
    if(this.ctx.state==='suspended')this.ctx.resume();
    const o=this.ctx.createOscillator();const g=this.ctx.createGain();
    o.type=type;o.frequency.value=freq;g.gain.value=gain;
    if(ramp)g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+duration);
    o.connect(g);g.connect(this.ctx.destination);
    o.start(this.ctx.currentTime);o.stop(this.ctx.currentTime+duration);
  },
  click(){this._play(800,'sine',0.06,0.04,true)},
  select(){
    this._init();if(!this.ctx)return;
    if(this.ctx.state==='suspended')this.ctx.resume();
    const t=this.ctx.currentTime;
    const o=this.ctx.createOscillator();const g=this.ctx.createGain();
    o.type='sine';o.frequency.setValueAtTime(600,t);o.frequency.linearRampToValueAtTime(900,t+0.08);
    g.gain.setValueAtTime(0.06,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
    o.connect(g);g.connect(this.ctx.destination);o.start(t);o.stop(t+0.15);
  },
  chapter(){
    this._init();if(!this.ctx)return;
    if(this.ctx.state==='suspended')this.ctx.resume();
    const t=this.ctx.currentTime;
    [523,659,784].forEach((f,i)=>{
      const o=this.ctx.createOscillator();const g=this.ctx.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0,t+i*0.15);g.gain.linearRampToValueAtTime(0.05,t+i*0.15+0.05);
      g.gain.exponentialRampToValueAtTime(0.001,t+i*0.15+0.5);
      o.connect(g);g.connect(this.ctx.destination);o.start(t+i*0.15);o.stop(t+i*0.15+0.5);
    });
  },
  notify(){this._play(1047,'sine',0.1,0.04,true)},
  ending(){
    this._init();if(!this.ctx)return;
    if(this.ctx.state==='suspended')this.ctx.resume();
    const t=this.ctx.currentTime;
    [392,523,659,784].forEach((f,i)=>{
      const o=this.ctx.createOscillator();const g=this.ctx.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0,t+i*0.25);g.gain.linearRampToValueAtTime(0.045,t+i*0.25+0.1);
      g.gain.exponentialRampToValueAtTime(0.001,t+i*0.25+1.2);
      o.connect(g);g.connect(this.ctx.destination);o.start(t+i*0.25);o.stop(t+i*0.25+1.2);
    });
  }
};

// =============================================
// PARTICLE SYSTEM
// =============================================
const ParticleSystem={
  canvas:null,ctx:null,particles:[],mood:'calm',running:false,raf:null,maxParticles:40,
  moodConfigs:{
    calm:{colors:['rgba(232,200,100,A)','rgba(255,220,120,A)','rgba(200,180,80,A)'],sizeMin:1,sizeMax:3,speedX:[-0.15,0.15],speedY:[-0.4,-0.1],pulse:false,count:35},
    hopeful:{colors:['rgba(232,200,100,A)','rgba(255,220,120,A)','rgba(200,180,80,A)'],sizeMin:1,sizeMax:3.5,speedX:[-0.15,0.15],speedY:[-0.5,-0.15],pulse:false,count:40},
    tense:{colors:['rgba(80,60,80,A)','rgba(120,40,50,A)','rgba(60,50,70,A)'],sizeMin:1,sizeMax:3,speedX:[-0.1,0.1],speedY:[0.05,0.25],pulse:false,count:30},
    dark:{colors:['rgba(60,30,40,A)','rgba(100,30,40,A)','rgba(50,40,60,A)'],sizeMin:1.5,sizeMax:3.5,speedX:[-0.1,0.1],speedY:[0.08,0.3],pulse:false,count:30},
    emotional:{colors:['rgba(180,200,255,A)','rgba(150,230,180,A)','rgba(200,180,255,A)'],sizeMin:1.5,sizeMax:4,speedX:[-0.1,0.1],speedY:[-0.2,0.1],pulse:true,count:30},
    ending:{colors:['rgba(255,220,120,A)','rgba(200,255,200,A)','rgba(180,200,255,A)','rgba(255,200,180,A)'],sizeMin:1,sizeMax:4,speedX:[-0.3,0.3],speedY:[-0.6,-0.15],pulse:true,count:50},
    rooftop:{colors:['rgba(200,210,230,A)','rgba(180,190,210,A)'],sizeMin:1,sizeMax:2.5,speedX:[0.5,1.5],speedY:[-0.1,0.1],pulse:false,count:35},
    schoolgate:{colors:['rgba(120,160,60,A)','rgba(160,140,50,A)','rgba(100,140,50,A)'],sizeMin:2,sizeMax:4,speedX:[-0.2,0.2],speedY:[0.2,0.6],pulse:false,count:25}
  },
  init(){
    this.canvas=$('particle-canvas');
    if(!this.canvas)return;
    this.ctx=this.canvas.getContext('2d');
    this._resize();
    window.addEventListener('resize',()=>this._resize());
  },
  _resize(){
    if(!this.canvas)return;
    this.canvas.width=this.canvas.parentElement.clientWidth;
    this.canvas.height=this.canvas.parentElement.clientHeight;
  },
  _rand(min,max){return Math.random()*(max-min)+min},
  _createParticle(){
    const cfg=this.moodConfigs[this.mood]||this.moodConfigs.calm;
    const colorTpl=cfg.colors[Math.floor(Math.random()*cfg.colors.length)];
    const alpha=this._rand(0.15,0.55);
    const color=colorTpl.replace('A',alpha.toFixed(2));
    return{
      x:this._rand(0,this.canvas.width),
      y:this._rand(0,this.canvas.height),
      r:this._rand(cfg.sizeMin,cfg.sizeMax),
      vx:this._rand(cfg.speedX[0],cfg.speedX[1]),
      vy:this._rand(cfg.speedY[0],cfg.speedY[1]),
      alpha:alpha,
      baseAlpha:alpha,
      color:colorTpl,
      pulse:cfg.pulse,
      pulseSpeed:this._rand(0.005,0.02),
      pulsePhase:this._rand(0,Math.PI*2),
      life:0
    };
  },
  setMood(mood){
    if(!this.moodConfigs[mood])mood='calm';
    this.mood=mood;
    this.particles=[];
    const cfg=this.moodConfigs[mood];
    const count=cfg.count||40;
    for(let i=0;i<count;i++)this.particles.push(this._createParticle());
  },
  update(){
    const cfg=this.moodConfigs[this.mood]||this.moodConfigs.calm;
    const w=this.canvas.width,h=this.canvas.height;
    for(let i=this.particles.length-1;i>=0;i--){
      const p=this.particles[i];
      p.x+=p.vx;p.y+=p.vy;p.life++;
      if(p.pulse){p.pulsePhase+=p.pulseSpeed;p.alpha=p.baseAlpha*(0.5+0.5*Math.sin(p.pulsePhase))}
      if(p.x<-10||p.x>w+10||p.y<-10||p.y>h+10){this.particles[i]=this._createParticle();const np=this.particles[i];
        if(cfg.speedY[0]<0&&cfg.speedY[1]<0)np.y=h+5;
        else if(cfg.speedY[0]>0)np.y=-5;
        else if(cfg.speedX[0]>0.3)np.x=-5;
      }
    }
  },
  draw(){
    if(!this.ctx)return;
    this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
    for(const p of this.particles){
      const c=p.color.replace('A',p.alpha.toFixed(2));
      this.ctx.beginPath();this.ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      this.ctx.fillStyle=c;this.ctx.fill();
    }
  },
  _loop(){
    if(!this.running)return;
    this.update();this.draw();
    this.raf=requestAnimationFrame(()=>this._loop());
  },
  start(){if(this.running)return;this.running=true;this._loop()},
  stop(){this.running=false;if(this.raf){cancelAnimationFrame(this.raf);this.raf=null}if(this.ctx)this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height)}
};

function preloadImages(cb){
  const all=[...Object.values(IMG.chars),...Object.values(IMG.scenes),'title_bg.png','title_emblem.png'];
  const audioFiles=Object.values(BGM.files);
  const total=all.length+audioFiles.length;
  let loaded=0;let done=false;const bar=$('loading-bar');
  const finish=()=>{if(done)return;done=true;cb()};
  const tick=()=>{loaded++;bar.style.width=Math.round(loaded/total*100)+'%';if(loaded>=total)finish()};
  all.forEach(src=>{const img=new Image();img.onload=img.onerror=tick;img.src=src});
  audioFiles.forEach(src=>{const a=new Audio();a.preload='auto';a.oncanplaythrough=a.onerror=tick;a.src=src;setTimeout(()=>{if(!done){tick()}},3000)});
  setTimeout(finish,8000);
}

const BGM={
  currentMood:null,currentAudio:null,nextAudio:null,fadingOut:null,vol:0.45,
  files:{
    calm:'bgm_calm.mp3',
    tense:'bgm_tense.mp3',
    dark:'bgm_dark.mp3',
    emotional:'bgm_emotional.mp3',
    hopeful:'bgm_hopeful.mp3',
    ending:'bgm_ending.mp3'
  },
  _create(mood){
    const a=new Audio(this.files[mood]);
    a.loop=true;a.volume=0;a.preload='auto';
    return a;
  },
  play(mood){
    if(!mood||mood===this.currentMood)return;
    if(!this.files[mood])return;
    const targetVol=this.vol;
    if(this.currentAudio){
      const old=this.currentAudio;
      this.fadingOut=old;
      const fadeOut=setInterval(()=>{
        if(old.volume>0.02){old.volume=Math.max(0,old.volume-0.02)}
        else{clearInterval(fadeOut);old.pause();old.currentTime=0;if(this.fadingOut===old)this.fadingOut=null}
      },50);
    }
    this.currentMood=mood;
    const audio=this._create(mood);
    this.currentAudio=audio;
    const startPlay=()=>{
      audio.play().then(()=>{
        let v=0;
        const fadeIn=setInterval(()=>{
          v+=0.015;
          if(v>=targetVol){audio.volume=targetVol;clearInterval(fadeIn)}
          else{audio.volume=v}
        },50);
      }).catch(e=>{
        console.log('BGM blocked:',e);
        const unlock=()=>{audio.play().catch(()=>{});document.removeEventListener('touchstart',unlock);document.removeEventListener('click',unlock)};
        document.addEventListener('touchstart',unlock,{once:true});
        document.addEventListener('click',unlock,{once:true});
      });
    };
    startPlay();
  },
  stop(){
    if(this.currentAudio){
      const old=this.currentAudio;
      const fadeOut=setInterval(()=>{
        if(old.volume>0.02){old.volume=Math.max(0,old.volume-0.02)}
        else{clearInterval(fadeOut);old.pause();old.currentTime=0}
      },40);
    }
    this.currentAudio=null;this.currentMood=null;
  },
  fadeOut(){
    if(!this.currentAudio)return;
    const audio=this.currentAudio;
    const fade=setInterval(()=>{
      if(audio.volume>0.01){audio.volume=Math.max(0,audio.volume-0.008)}
      else{clearInterval(fade);audio.pause();audio.currentTime=0}
    },50);
    this.currentAudio=null;this.currentMood=null;
  },
  init(){/* no-op, kept for compat */}
};

function restartGame(){BGM.stop();ParticleSystem.setMood('calm');$('menu-overlay').classList.remove('active');$('ending-screen').classList.remove('active');state={courage:0,trust:0,hasEvidence:false,currentNode:null,textQueue:[],typing:false,textComplete:false,choicesActive:false};updateStats();$('stats-bar').classList.remove('active');showDialog(false);$('char-layer').innerHTML='';$('title-screen').classList.add('active');$('title-screen').classList.remove('fadeout')}

function playNode(nodeId){
  const node=STORY[nodeId];if(!node){console.error('Missing:',nodeId);return}state.currentNode=nodeId;
  if(node.chapter){$('chapter-display').textContent=node.chapterLabel||'';showChapter(node.chapter,node.chapterTitle,()=>runNode(node))}else{runNode(node)}
}
function runNode(node){
  let n=node;if(typeof n.dialog==='function')n={...n,dialog:n.dialog()};if(typeof n.next==='function')n={...n,next:n.next()};if(typeof n.chars==='function')n={...n,chars:n.chars()};
  if(n.scene)setScene(n.scene);if(n.chars!==undefined)setChars(n.chars);if(n.statsBar)$('stats-bar').classList.add('active');
  if(n.music)BGM.play(n.music);
  // Update particle mood based on scene or music
  if(n.scene==='rooftop')ParticleSystem.setMood('rooftop');
  else if(n.scene==='schoolgate')ParticleSystem.setMood('schoolgate');
  else if(n.music)ParticleSystem.setMood(n.music);
  if(n.shake)setTimeout(()=>{$('game').classList.add('shake');setTimeout(()=>$('game').classList.remove('shake'),500)},300);
  if(n.legal){showLegal(n.legal,()=>{if(n.next)playNode(n.next)});return}
  if(n.ending){BGM.fadeOut();showEnding(n.ending.badge,n.ending.title,n.ending.desc,n.ending.bg);return}
  if(n.dialog){showDialog(true);setSpeaker(n.speaker,n.speakerType);state.textQueue=Array.isArray(n.dialog)?[...n.dialog]:[n.dialog];advanceDialog(n)}
  else if(n.choices){showChoices(n.choices)}else if(n.next){playNode(n.next)}
}
function advanceDialog(node){
  if(state.textQueue.length>0){const line=state.textQueue.shift();if(typeof line==='object'){setSpeaker(line.speaker,line.speakerType);typeText(line.text)}else{typeText(line)}}
  else{if(node.choices)showChoices(node.choices);else if(node.next)playNode(node.next)}
}
document.addEventListener('click',e=>{
  if(state.choicesActive||$('title-screen').classList.contains('active')||$('chapter-overlay').classList.contains('active')||$('ending-screen').classList.contains('active')||$('menu-overlay').classList.contains('active')||$('legal-panel').classList.contains('active'))return;
  if(e.target.closest('.choice-btn')||e.target.closest('#menu-btn')||e.target.closest('.menu-item'))return;
  let node=STORY[state.currentNode];if(!node)return;
  let rn={...node};if(typeof rn.dialog==='function')rn.dialog=rn.dialog();if(typeof rn.next==='function')rn.next=rn.next();if(typeof rn.chars==='function')rn.chars=rn.chars();
  if(state.typing){completeText();return}
  if(state.textComplete){SFX.click();state.textComplete=false;if(state.textQueue.length>0)advanceDialog(rn);else if(rn.choices)showChoices(rn.choices);else if(rn.next)playNode(rn.next)}
});

// === INIT ===
// Generate title light rays
(function(){
  const raysEl=document.getElementById('title-rays');
  if(!raysEl)return;
  for(let i=0;i<12;i++){
    const ray=document.createElement('div');ray.className='title-ray';
    ray.style.setProperty('--r',(i*30)+'deg');
    ray.style.opacity=0.3+Math.random()*0.4;
    ray.style.animationDuration=(15+Math.random()*10)+'s';
    raysEl.appendChild(ray);
  }
})();

preloadImages(()=>{
  $('loading-screen').classList.add('hidden');
  ParticleSystem.init();
  ParticleSystem.setMood('calm');
  ParticleSystem.start();
  setTimeout(()=>{
    $('title-screen').classList.add('active');
    $('start-btn').addEventListener('click',()=>{
      BGM.init();SFX.select();
      $('title-screen').classList.add('fadeout');
      setTimeout(()=>{$('title-screen').classList.remove('active','fadeout');playNode('ch1_start')},800);
    });
  },400);
});
</script>
